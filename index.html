<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💎 BLUE PREMIUM • LIVE EARNINGS</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js 3 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0a0c15;
            background-image: radial-gradient(circle at 30% 20%, #121725 0%, #03050b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* main card – dark glass with blue accents */
        .dashboard {
            max-width: 500px;
            width: 100%;
            background: rgba(8, 12, 22, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 255, 0.3);
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(0, 0, 255, 0.15) inset, 0 0 40px rgba(0, 0, 255, 0.35);
            padding: 26px 20px 32px 20px;
            transition: all 0.2s;
            color: #fff;
        }

        /* status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            color: #b0c2e0;
            letter-spacing: 0.3px;
            padding: 0 5px 10px 5px;
            border-bottom: 1px solid rgba(0, 0, 255, 0.35);
            margin-bottom: 20px;
        }

        .status-left i {
            color: #4d88ff;
            margin-right: 6px;
            text-shadow: 0 0 12px #0000FF;
        }

        .status-right {
            display: flex;
            gap: 16px;
        }

        .status-right i {
            color: #4d88ff;
            filter: drop-shadow(0 0 6px #0000FF);
        }

        .badge-live {
            background: #001f3f;
            color: white;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 12px #0000FF;
            border: 1px solid #4d88ff;
        }

        .badge-live i {
            font-size: 10px;
            animation: pulse 1.5s infinite;
            color: #4d88ff;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); text-shadow: 0 0 15px #4d88ff; }
            100% { opacity: 1; transform: scale(1); }
        }

        /* main balance */
        .balance-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b8ccff;
            background: rgba(0, 0, 30, 0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(0, 0, 255, 0.5);
            backdrop-filter: blur(5px);
            margin-bottom: 12px;
        }

        .balance-number {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff, #7aa5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px rgba(0, 0, 255, 0.9));
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balance-number small {
            font-size: 28px;
            font-weight: 400;
            background: none;
            -webkit-text-fill-color: #7aa5ff;
            color: #7aa5ff;
            margin-left: 8px;
            filter: none;
        }

        .balance-change {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 18px;
            background: rgba(0, 10, 30, 0.7);
            padding: 8px 18px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(77, 136, 255, 0.3);
        }

        .profit-up {
            color: #7aa5ff;
            font-weight: 700;
            background: rgba(0, 0, 255, 0.15);
            padding: 4px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profit-up i {
            font-size: 14px;
        }

        .last-update {
            color: #8a9fd1;
            font-size: 13px;
        }

        /* live stats cards */
        .live-stats {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin: 28px 0 25px;
        }

        .stat-item {
            background: rgba(0, 7, 25, 0.8);
            border: 1px solid rgba(0, 0, 255, 0.4);
            border-radius: 28px;
            padding: 16px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 25px -10px black;
        }

        .stat-icon {
            background: rgba(0, 0, 255, 0.2);
            width: 45px;
            height: 45px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 1px solid #4d88ff;
            color: #4d88ff;
            font-size: 22px;
        }

        .stat-label {
            font-size: 13px;
            color: #99b3ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #99b3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }

        /* chart area */
        .chart-area {
            background: rgba(0, 5, 20, 0.6);
            border-radius: 32px;
            padding: 20px 15px 15px 15px;
            border: 1px solid rgba(0, 0, 255, 0.4);
            backdrop-filter: blur(4px);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px -5px black;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            color: #b0c6ff;
            font-size: 14px;
            margin-bottom: 12px;
            padding: 0 8px;
        }

        .chart-header span i {
            color: #4d88ff;
            margin-right: 4px;
        }

        canvas {
            width: 100% !important;
            height: 180px !important;
            display: block;
            border-radius: 24px;
        }

        /* live ticker */
        .ticker-wrap {
            background: rgba(0, 8, 25, 0.8);
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #4d88ff;
            margin-bottom: 22px;
            box-shadow: 0 0 15px rgba(0, 0, 255, 0.2);
        }

        .ticker-icon {
            background: #0000FF;
            width: 42px;
            height: 42px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 0 20px #0000FF;
        }

        .ticker-content {
            flex: 1;
        }

        .ticker-label {
            font-size: 14px;
            color: #99b8ff;
            font-weight: 500;
        }

        .ticker-amount {
            font-size: 26px;
            font-weight: 700;
            color: #b8ccff;
            letter-spacing: 1px;
        }

        .ticker-amount i {
            color: #4d88ff;
            font-size: 18px;
            margin-left: 8px;
        }

        /* history list */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(0, 10, 30, 0.5);
            border-radius: 40px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(0, 0, 255, 0.3);
            backdrop-filter: blur(5px);
            transition: 0.1s;
        }

        .history-day {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-day i {
            font-size: 20px;
            color: #4d88ff;
        }

        .day-name {
            font-weight: 600;
            color: white;
        }

        .day-date {
            font-size: 13px;
            color: #8aa3dd;
        }

        .history-profit {
            font-weight: 700;
            font-size: 22px;
            background: linear-gradient(135deg, #aac3ff, #4d88ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profit-down {
            background: linear-gradient(135deg, #ff8a8a, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .refresh-note {
            text-align: center;
            font-size: 13px;
            color: #5f73a3;
            margin-top: 25px;
            border-top: 1px dashed #1a2b4a;
            padding-top: 18px;
        }

        .refresh-note i {
            color: #4d88ff;
        }
    </style>
</head>
<body>
    <div class="dashboard" id="dashboardMain">

        <!-- status bar with blue theme -->
        <div class="status-bar">
            <div class="status-left">
                <i class="fas fa-wifi"></i> LIVE · 5G <i class="fas fa-bolt" style="margin-left: 6px;"></i>
            </div>
            <div class="status-right">
                <i class="fas fa-lock"></i>
                <i class="fas fa-battery-three-quarters"></i>
                <span class="badge-live"><i class="fas fa-circle"></i> EARNING</span>
            </div>
        </div>

        <!-- main balance (dynamic) -->
        <div class="balance-container">
            <div class="balance-label"><i class="fas fa-crown" style="margin-right: 6px;"></i> TOTAL BALANCE</div>
            <div class="balance-number" id="mainBalance">$0<span>.00</span></div>
            <div class="balance-change" id="balanceChangeInfo">
                <!-- filled by js -->
            </div>
        </div>

        <!-- live stats row -->
        <div class="live-stats">
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-rocket"></i></div>
                <span class="stat-label">1H PROFIT</span>
                <span class="stat-value" id="oneHourProfit">+$42</span>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
                <span class="stat-label">TODAY</span>
                <span class="stat-value" id="todayEarn">+$248</span>
            </div>
            <div class="stat-item">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <span class="stat-label">THIS WEEK</span>
                <span class="stat-value" id="weekEarn">$5.2k</span>
            </div>
        </div>

        <!-- chart area (earnings history) -->
        <div class="chart-area">
            <div class="chart-header">
                <span><i class="fas fa-chart-line"></i> Earnings last 7 days</span>
                <span><i class="fas fa-arrow-up" style="color: #4d88ff;"></i> +32% vs last week</span>
            </div>
            <canvas id="earningChart"></canvas>
        </div>

        <!-- live ticker : latest earning push (blue) -->
        <div class="ticker-wrap" id="liveTicker">
            <!-- dynamic via js -->
        </div>

        <!-- history (daily earning) -->
        <div class="history-list" id="dailyHistoryContainer">
            <!-- generated by js -->
        </div>

        <!-- refresh hint -->
        <div class="refresh-note">
            <i class="fas fa-arrows-rotate"></i> Pull to refresh • earnings update in realtime <i class="fas fa-gem" style="margin-left: 6px; color: #4d88ff;"></i>
        </div>
    </div>

    <script>
        (function() {
            // helper to generate random realistic between 400 and 2500
            function randEarning(min = 400, max = 2600) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            // generate last 7 days with random profit (for chart & history)
            function generateWeekData() {
                const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                const today = new Date();
                const weekData = [];
                for (let i = 6; i >= 0; i--) {
                    let d = new Date(today);
                    d.setDate(today.getDate() - i);
                    const dayName = days[d.getDay()] || ''; 
                    // random profit
                    let profit = randEarning(400, 2200);
                    if (i === 6) profit = randEarning(900, 2500); // today more punch
                    if (i === 5) profit = randEarning(600, 1900);
                    if (i === 4) profit = randEarning(300, 2100);
                    if (i === 3) profit = randEarning(800, 2300);
                    if (i === 2) profit = randEarning(500, 1700);
                    if (i === 1) profit = randEarning(700, 2400);
                    if (i === 0) profit = randEarning(450, 2000);
                    weekData.push({
                        day: dayName,
                        date: `${d.getDate()} ${d.toLocaleString('default', { month: 'short' })}`,
                        profit: profit
                    });
                }
                return weekData;  // order from 6 days ago -> today
            }

            // current total balance
            function generateBalance(weekArray) {
                const base = 8240 + Math.floor(Math.random() * 4500);
                const lastWeekTotal = weekArray.reduce((acc, d) => acc + d.profit, 0);
                const extra = Math.floor(lastWeekTotal * 0.73);
                return base + extra;
            }

            // DOM elements
            const mainBalanceEl = document.getElementById('mainBalance');
            const balanceChangeInfo = document.getElementById('balanceChangeInfo');
            const oneHourProfitEl = document.getElementById('oneHourProfit');
            const todayEarnEl = document.getElementById('todayEarn');
            const weekEarnEl = document.getElementById('weekEarn');
            const liveTicker = document.getElementById('liveTicker');
            const dailyHistory = document.getElementById('dailyHistoryContainer');

            let chartInstance = null;

            // render everything
            function refreshDashboard() {
                // generate fresh week data
                const weekArray = generateWeekData();  // length 7, index0 = 6days ago, index6 = today
                
                // compute total week earning (last 7 days sum)
                const totalWeek = weekArray.reduce((sum, d) => sum + d.profit, 0);
                
                // today's profit (last element)
                const todayProfit = weekArray[6].profit;
                
                // yesterday profit (index5)
                const yesterdayProfit = weekArray[5].profit;
                
                // 1h profit (random between 15 and 110)
                const oneHr = Math.floor(Math.random() * 95) + 18;
                const oneHourSign = Math.random() > 0.2 ? '+' : '-';
                const oneHourValue = (oneHourSign === '+' ? oneHr : -oneHr);
                
                // total balance
                const totalBalance = generateBalance(weekArray);
                
                // format balance
                const balanceDollars = Math.floor(totalBalance);
                const balanceCents = String(totalBalance - balanceDollars).split('.')[1] || '00';
                mainBalanceEl.innerHTML = `$${balanceDollars.toLocaleString()}<span>.${balanceCents.padEnd(2,'0').substring(0,2)}</span>`;
                
                // change info (compare to yesterday)
                const changeAmount = todayProfit - yesterdayProfit;
                const changePercent = ((changeAmount / yesterdayProfit) * 100).toFixed(1);
                const isPositive = changeAmount >= 0;
                balanceChangeInfo.innerHTML = `
                    <span class="profit-up" style="color: ${isPositive ? '#7aa5ff' : '#ff6b6b'}; background: ${isPositive ? 'rgba(0,0,255,0.15)' : 'rgba(255,80,80,0.15)'}">
                        <i class="fas ${isPositive ? 'fa-arrow-up' : 'fa-arrow-down'}"></i> $${Math.abs(changeAmount)} (${changePercent}%)
                    </span>
                    <span class="last-update"><i class="far fa-clock"></i> just now</span>
                `;
                
                // stats
                oneHourProfitEl.innerHTML = (oneHourValue > 0 ? '+' : '') + `$${oneHourValue}`;
                oneHourProfitEl.style.color = oneHourValue >= 0 ? '#7aa5ff' : '#ff827b';
                todayEarnEl.innerHTML = `+$${todayProfit}`;
                weekEarnEl.innerHTML = `$${Math.floor(totalWeek / 1000)}.${Math.floor((totalWeek % 1000)/100)}k`;

                // live ticker
                const tickerRandom = randEarning(50, 450);
                const tickerSign = Math.random() > 0.3 ? '+' : '-';
                const tickerAmount = tickerSign === '+' ? tickerRandom : -tickerRandom;
                liveTicker.innerHTML = `
                    <div class="ticker-icon"><i class="fas fa-bolt"></i></div>
                    <div class="ticker-content">
                        <div class="ticker-label"><i class="fas fa-microchip"></i> LIVE SIGNAL · 2 sec ago</div>
                        <div class="ticker-amount">${tickerAmount > 0 ? '+' : ''}$${Math.abs(tickerAmount)} USD <i class="fas ${tickerAmount >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'}" style="color:${tickerAmount >= 0 ? '#4d88ff' : '#ff6b6b'}"></i></div>
                    </div>
                `;

                // history list (last 7 days)
                let historyHtml = '';
                for (let i = weekArray.length - 1; i >= 0; i--) {
                    const d = weekArray[i];
                    const isToday = (i === weekArray.length - 1);
                    const icon = isToday ? 'fa-star' : 'fa-calendar-alt';
                    historyHtml += `
                        <div class="history-item">
                            <div class="history-day">
                                <i class="fas ${icon}" style="color: ${isToday ? '#4d88ff' : '#6d8ad0'}"></i>
                                <div>
                                    <span class="day-name">${d.day} ${isToday ? '(Today)' : ''}</span>
                                    <div class="day-date">${d.date}</div>
                                </div>
                            </div>
                            <div class="history-profit">+$${d.profit}</div>
                        </div>
                    `;
                }
                dailyHistory.innerHTML = historyHtml;

                // chart update
                const ctx = document.getElementById('earningChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: weekArray.map(d => d.day),
                        datasets: [{
                            label: 'daily earnings $',
                            data: weekArray.map(d => d.profit),
                            backgroundColor: 'rgba(0, 0, 255, 0.15)',
                            borderColor: '#4d88ff',
                            borderWidth: 3,
                            pointBackgroundColor: '#7aa5ff',
                            pointBorderColor: '#000',
                            pointRadius: 5,
                            pointHoverRadius: 8,
                            tension: 0.2,
                            fill: true,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { backgroundColor: '#00122e', titleColor: '#7aa5ff' }
                        },
                        scales: {
                            y: {
                                grid: { color: 'rgba(0,0,255,0.1)' },
                                ticks: { callback: (v) => '$' + v, color: '#b0c6ff' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#b0c6ff' }
                            }
                        }
                    }
                });
            }

            // initial render
            refreshDashboard();

            // auto refresh every 8-15 seconds
            function startLiveLoop() {
                setInterval(() => {
                    refreshDashboard();
                }, 8000 + Math.floor(Math.random() * 7000));
            }
            startLiveLoop();

            // click to refresh
            document.getElementById('dashboardMain').addEventListener('click', function(e) {
                if (e.target.closest('.refresh-note')) return;
                refreshDashboard();
            });

            // pull down to refresh
            let touchStartY = 0;
            document.body.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, {passive: true});
            document.body.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                if (touchEndY - touchStartY > 70) {
                    refreshDashboard();
                }
            });
        })();
    </script>
</body>
</html>
